hpo:
  n_trials: 50
  timeout: null
  study_name: "pathogenicity_hpo"
  storage: "sqlite:///results/hpo_study.db"
  sampler: "tpe"
  pruner: "median"
  pruner_n_startup_trials: 5
  pruner_n_warmup_steps: 5
  direction: "maximize"
  metric: "val_auroc"

  search_space:
    learning_rate:
      type: "float"
      low: 1.0e-5
      high: 1.0e-2
      log: true
    batch_size:
      type: "categorical"
      choices: [32, 64, 128]
    dropout:
      type: "float"
      low: 0.1
      high: 0.5
    fusion_type:
      type: "categorical"
      choices: ["early", "attention", "cross_attention", "transformer"]
    mutation_embed_dim:
      type: "categorical"
      choices: [64, 128, 256]
    expression_embed_dim:
      type: "categorical"
      choices: [128, 256, 512]
    focal_loss_gamma:
      type: "float"
      low: 0.5
      high: 5.0
    weight_decay:
      type: "float"
      low: 1.0e-6
      high: 1.0e-2
      log: true
    num_attention_heads:
      type: "categorical"
      choices: [2, 4, 8]

  training:
    max_epochs: 30
    patience: 10

  retrain:
    enabled: true
    max_epochs: 100
    patience: 20

data:
  clinvar_url: "https://ftp.ncbi.nlm.nih.gov/pub/clinvar/tab_delimited/variant_summary.txt.gz"
  cbioportal_url: "https://www.cbioportal.org/api"
  studies:
    - "brca_tcga_pan_can_atlas_2018"
    - "luad_tcga_pan_can_atlas_2018"
    - "coadread_tcga_pan_can_atlas_2018"
    - "ucec_tcga_pan_can_atlas_2018"
    - "ov_tcga_pan_can_atlas_2018"
  test_size: 0.15
  val_size: 0.15
  random_seed: 42

model:
  mutation_input_dim: 42
  expression_input_dim: 2000
  methylation_input_dim: 2000
  methylation_embed_dim: 128
  cnv_input_dim: 200
  cnv_embed_dim: 64
  clinical_input_dim: 32
  clinical_embed_dim: 32
  fusion_dim: 256
  num_classes: 4
  dropout: 0.3
  fusion_type: "cross_attention"
  mutation_embed_dim: 128
  expression_embed_dim: 256

training:
  max_epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 15
  focal_loss_gamma: 2.0
  loss_type: "focal"
  scheduler_type: "cosine_warm_restarts"
  cosine_t0: 10
  cosine_t_mult: 2
  scheduler_patience: 5
  scheduler_factor: 0.5
  num_workers: 4

experiment:
  name: "hpo_sweep"
  tracking_uri: "mlruns"
